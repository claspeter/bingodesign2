<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Themis Bingo — 3D Draw Machine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <!-- Three.js canvas -->
    <div id="canvas-wrap"></div>

    <!-- UI Panel (right side) -->
    <div id="ui-panel">

      <div id="header">
        <h1 class="logo">BINGO</h1>
        <p class="subtitle">90-Ball Draw Machine</p>
      </div>

      <!-- Current drawn ball -->
      <div id="current-ball-wrap">
        <div id="current-ball-inner">
          <span id="current-num">–</span>
        </div>
        <div id="current-meta">
          <span id="current-label">Waiting...</span>
        </div>
      </div>

      <!-- Controls -->
      <div id="controls">
        <button id="draw-btn" class="btn-primary">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M12 2a10 10 0 1 1 0 20A10 10 0 0 1 12 2zm0 4a1 1 0 0 0-1 1v4.586L8.707 9.293a1 1 0 0 0-1.414 1.414l4 4a1 1 0 0 0 1.414 0l4-4a1 1 0 0 0-1.414-1.414L13 11.586V7a1 1 0 0 0-1-1z"/>
          </svg>
          Draw Ball
        </button>
        <div id="auto-row">
          <label class="toggle-label">
            <input type="checkbox" id="auto-toggle" />
            <span class="toggle-track"></span>
            Auto
          </label>
          <div id="speed-wrap">
            <input type="range" id="speed-slider" min="2" max="15" value="5" step="1" />
            <span id="speed-label">5s</span>
          </div>
        </div>
        <div id="progress-row">
          <div id="progress-bar-wrap">
            <div id="progress-bar"></div>
          </div>
          <span id="count-label"><span id="count">0</span> / 90</span>
        </div>
        <button id="reset-btn" class="btn-secondary">Reset</button>
      </div>

      <!-- Bingo board -->
      <div id="board-wrap">
        <div id="board-header">
          <span>1–9</span><span>10–19</span><span>20–29</span>
          <span>30–39</span><span>40–49</span><span>50–59</span>
          <span>60–69</span><span>70–79</span><span>80–90</span>
        </div>
        <div id="bingo-board"></div>
      </div>

    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
